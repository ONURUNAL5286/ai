<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yeni AI Agent Office Sprint</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #17202a;
      }
      body {
        margin: 0;
      }
      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      header {
        border-bottom: 1px solid #d9dee7;
        padding-bottom: 24px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 36px;
        line-height: 1.1;
      }
      h2 {
        margin: 0 0 12px;
        font-size: 20px;
      }
      p {
        max-width: 760px;
        line-height: 1.6;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 16px;
        margin-top: 24px;
      }
      section {
        background: #ffffff;
        border: 1px solid #d9dee7;
        border-radius: 8px;
        padding: 20px;
      }
      li {
        margin: 8px 0;
      }
      code {
        background: #eef1f5;
        border-radius: 4px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Yeni AI Agent Office Sprint</h1>
        <p>Sprint hedefi belirtilmedi.</p>
      </header>
      <div class="grid">
        <section>
          <h2>Hedef Kullanici</h2>
          <p>Belirtilmedi</p>
        </section>
        <section>
          <h2>Ana Ozellikler</h2>
          <ul>
            <li>Belirtilmedi</li>
          </ul>
        </section>
        <section>
          <h2>Olmazsa Olmazlar</h2>
          <ul>
            <li>Belirtilmedi</li>
          </ul>
        </section>
        <section>
          <h2>Teslim</h2>
          <p>Bu proje AI Agent Office tarafindan <code>sprint-20260524T0956</code> sprintinden olusturuldu.</p>
        </section>
      </div>
    </main>
  </body>
</html>
